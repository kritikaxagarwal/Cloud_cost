version: "1.0"
name: "cloud-cost-guardian"
entry_point: "environment:CloudCostEnv"
env_type: "continuous"
tasks:
  - id: "daily_peaks"
    difficulty: "easy"
    path: "inference.py"
    target_score: 0.8
    task: "easy"
    grader:
      type: "score"
      metric: "avg_reward"
      threshold: 0.8

  - id: "weekly_budget"
    difficulty: "medium"
    path: "inference.py"
    target_score: 0.75
    task: "medium"
    grader:
      type: "score"
      metric: "avg_reward"
      threshold: 0.75

  - id: "chaos_mode"
    difficulty: "hard"
    path: "inference.py"
    target_score: 0.7
    task: "hard"
    grader:
      type: "score"
      metric: "avg_reward"
      threshold: 0.7
